<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Notebook</title>
    <link rel="stylesheet" href="/style.css">
    <!-- marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
    <!-- highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
</head>
<body>
    <div class="layout">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Workspace</h2>
                <div class="sidebar-actions">
                    <button class="terminal-btn" id="terminalBtn" aria-label="Open Terminal" title="Open Terminal">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2.146 3.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L4.793 6.5 2.146 3.854a.5.5 0 0 1 0-.708zM6 10h4a.5.5 0 0 1 0 1H6a.5.5 0 0 1 0-1z"/></svg>
                    </button>
                    <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">&times;</button>
                </div>
            </div>
            <div class="tree" id="tree">
                <div class="loading">Loading...</div>
            </div>
        </aside>
        <div class="divider" id="divider"></div>
        <main class="content" id="content">
            <!-- Finder grid view (default) -->
            <div class="finder" id="finder">
                <div class="finder-toolbar">
                    <div class="finder-breadcrumb" id="finderBreadcrumb"><span data-path="">Workspace</span></div>
                    <div class="finder-actions">
                        <button class="finder-btn" id="newFolderBtn" title="New folder">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M.54 3.87L.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3H13.5a2 2 0 0 1 2 2v1H1.5V3.87zM0 13.5V5.864l.197-.98A1 1 0 0 1 1.178 4h12.644a1 1 0 0 1 .981 1.185l-1.286 6A1 1 0 0 1 12.536 12H1.977a1 1 0 0 1-.98-.82L0 6.5v7a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-1h1v1a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 13.5z"/><path d="M8 7a.5.5 0 0 1 .5.5V9H10a.5.5 0 0 1 0 1H8.5v1.5a.5.5 0 0 1-1 0V10H6a.5.5 0 0 1 0-1h1.5V7.5A.5.5 0 0 1 8 7z"/></svg>
                        </button>
                        <label class="finder-btn" title="Upload files">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5V12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1.6a.5.5 0 0 1 1 0V12a3 3 0 0 1-3 3H3a3 3 0 0 1-3-3v-1.6a.5.5 0 0 1 .5-.5z"/><path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/></svg>
                            <input type="file" id="finderUpload" multiple hidden>
                        </label>
                    </div>
                </div>
                <div class="finder-grid" id="finderGrid"></div>
                <div class="finder-empty" id="finderEmpty" style="display:none;">This folder is empty</div>
            </div>
            <!-- File preview overlay -->
            <div class="preview-overlay" id="previewOverlay">
                <div class="preview-header">
                    <div class="preview-breadcrumb" id="previewBreadcrumb"></div>
                    <div class="preview-actions">
                        <button class="preview-btn" id="previewEdit" title="Edit" style="display:none;"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.854a.5.5 0 0 1 .708 0l2.292 2.292a.5.5 0 0 1 0 .708l-9.5 9.5a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l9.5-9.5zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3-2.293-2.293L3 10.707V11h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l7.5-7.5z"/></svg></button>
                        <button class="preview-btn preview-save" id="previewSave" title="Save" style="display:none;"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13.354 3.354a.5.5 0 0 0-.708-.708L6 9.293 3.354 6.646a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0l7-7z"/></svg></button>
                        <button class="preview-btn" id="previewColorRules" title="Color Rules" style="display:none;"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.116l.094-.318z"/></svg></button>
                        <button class="preview-btn" id="previewDownload" title="Download"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5V12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1.6a.5.5 0 0 1 1 0V12a3 3 0 0 1-3 3H3a3 3 0 0 1-3-3v-1.6a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg></button>
                        <button class="preview-btn preview-close" id="previewClose" title="Close">&times;</button>
                    </div>
                </div>
                <div class="preview-body" id="previewBody"></div>
            </div>
        </main>
    </div>
    <script src="/app.js"></script>
</body>
</html>
